map $http_x_api_key $api_key_valid {
    default 0;
    "9efffe30-f562-4002-b482-a1a5e0b8578c" 1;
}

server {
    listen 4444;
    listen [::]:4444;
    server_name 173.246.63.124;
    
    access_log /var/log/nginx/zfleet-mvp-gateway.access.log;
    error_log /var/log/nginx/zfleet-mvp-gateway.error.log;

    set $require_auth 1;

    if ($api_key_valid = 0) {
        set $auth_check "${require_auth}:${request_uri}";
    }

    location = /health/auth {
        set $require_auth 0;

        proxy_pass http://127.0.0.1:4001/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Adicionar headers customizados
        proxy_set_header X-Gateway-Source "nginx-gateway";
        proxy_set_header X-Request-Time $request_time;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # POST /driver/login --> POST http://127.0.0.1:4001/auth/login
    location = /driver/login {
        if ($request_method != POST) {
            return 405;
        }

        if ($api_key_valid = 0) {
            return 404;
        }

        proxy_pass http://127.0.0.1:4001/auth/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Adicionar headers customizados ao upstream
        proxy_set_header X-User-Type "driver";
        proxy_set_header X-Gateway-Source "nginx-gateway";
        proxy_set_header X-Original-URI $request_uri;

        # Repassar a chave de API se existir
        proxy_set_header X-API-Key $http_x_api_key;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # POST /manager/login --> POST http://127.0.0.1:4001/auth/login/admin
    location = /manager/login {
        if ($request_method != POST) {
            return 405;
        }

        if ($api_key_valid = 0) {
            return 404;
        }

        proxy_pass http://127.0.0.1:4001/auth/login/admin;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Headers customizados
        proxy_set_header X-User-Type "manager";
        proxy_set_header X-Gateway-Source "nginx-gateway";
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-API-Key $http_x_api_key;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # POST /manager --> POST http://127.0.0.1:4001/user
    location = /manager {
        if ($request_method != POST) {
            return 405;
        }

        if ($api_key_valid = 0) {
            return 404;
        }

        proxy_pass http://127.0.0.1:4001/user;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Headers customizados
