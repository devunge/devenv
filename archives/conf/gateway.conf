        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-API-Key $http_x_api_key;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # GET /managers --> GET http://127.0.0.1:4001/user
    location = /managers {
